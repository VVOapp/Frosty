<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FrostVault</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --surface3: #475569;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-dim: rgba(59,130,246,0.15);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --freezer: #3b82f6;
      --fridge: #10b981;
      --shelf: #f59e0b;
      --box: #8b5cf6;
      --radius: 14px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 80px;
      overflow-x: hidden;
    }
    /* Header */
    .header {
      background: var(--surface);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--surface2);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo { font-size: 22px; }
    .header-title { font-size: 18px; font-weight: 700; }
    .header-sub { font-size: 11px; color: var(--text-muted); }
    .lang-btn {
      background: var(--surface2);
      border: none;
      color: var(--text);
      padding: 7px 13px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    /* Nav */
    .nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-top: 1px solid var(--surface2);
      display: flex;
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 10px 0 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 500;
      transition: color 0.2s;
      position: relative;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; stroke-width: 2; }
    .nav-btn.scan-main { color: white; }
    .nav-btn.scan-main .scan-circle {
      width: 52px; height: 52px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-top: -20px;
      border: 3px solid var(--bg);
      box-shadow: 0 4px 16px rgba(59,130,246,0.5);
    }
    .nav-btn.scan-main svg { margin: 0; }
    .nav-badge {
      position: absolute;
      top: 6px; right: calc(50% - 18px);
      background: var(--danger);
      color: white;
      font-size: 9px;
      font-weight: 700;
      min-width: 16px; height: 16px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
    }
    /* Screens */
    .screen { display: none; padding: 14px; }
    .screen.active { display: block; }
    /* Filter tabs */
    .filter-tabs {
      display: flex;
      gap: 7px;
      margin-bottom: 14px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tab {
      flex-shrink: 0;
      background: var(--surface2);
      border: none;
      color: var(--text-muted);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .filter-tab.active { background: var(--accent); color: white; }
    .filter-tab .dot { width: 8px; height: 8px; border-radius: 50%; }
    /* Search */
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 16px; height: 16px; }
    .search-input {
      width: 100%; background: var(--surface); border: 1px solid var(--surface2);
      border-radius: 10px; padding: 11px 12px 11px 36px; color: var(--text); font-size: 14px; outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    /* Item cards */
    .storage-section { margin-bottom: 22px; }
    .section-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .section-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .section-title { font-size: 14px; font-weight: 700; }
    .section-count {
      margin-left: auto;
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .item-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      gap: 11px;
      align-items: flex-start;
      cursor: pointer;
      border: 1px solid var(--surface2);
      transition: border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .item-card:active { border-color: var(--accent); }
    .item-thumb {
      width: 54px; height: 54px;
      border-radius: 10px;
      background: var(--surface2);
      flex-shrink: 0;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .item-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .item-body { flex: 1; min-width: 0; }
    .item-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
    .item-badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 8px;
      white-space: nowrap;
    }
    .badge-code { background: var(--surface2); color: var(--text-muted); font-family: 'Courier New', monospace; font-size: 11px; }
    .badge-ok { background: #064e3b; color: #6ee7b7; }
    .badge-soon { background: #78350f; color: #fcd34d; }
    .badge-exp { background: #7f1d1d; color: #fca5a5; }
    .badge-none { background: var(--surface2); color: var(--text-muted); }
    .item-qty {
      background: var(--surface2);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      flex-shrink: 0;
      align-self: center;
    }
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-muted);
    }
    .empty-state .e-icon { font-size: 52px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.5; }
    /* Form */
    .form-section { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input {
      width: 100%; background: var(--surface2);
      border: 1px solid transparent;
      border-radius: 11px;
      padding: 13px 14px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-input:focus { border-color: var(--accent); }
    select.form-input option { background: var(--surface2); }
    textarea.form-input { resize: vertical; min-height: 80px; }
    /* Photo area */
    .photo-area {
      width: 100%; height: 160px;
      background: var(--surface2);
      border-radius: var(--radius);
      border: 2px dashed var(--surface3);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 7px; cursor: pointer;
      overflow: hidden; position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .photo-area img { width: 100%; height: 100%; object-fit: cover; }
    .photo-area .pa-label { font-size: 13px; color: var(--text-muted); }
    .photo-area .pa-icon { font-size: 28px; }
    .photo-overlay {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.65);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px; color: white;
      pointer-events: none;
    }
    /* Storage selector */
    .storage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .storage-opt {
      background: var(--surface2);
      border: 2px solid transparent;
      border-radius: var(--radius);
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .storage-opt.sel { border-color: var(--accent); background: var(--accent-dim); }
    .storage-opt .so-icon { font-size: 24px; margin-bottom: 5px; }
    .storage-opt .so-label { font-size: 13px; font-weight: 600; }
    /* Qty */
    .qty-row { display: flex; align-items: center; gap: 14px; }
    .qty-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      background: var(--surface2);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .qty-val { font-size: 22px; font-weight: 700; min-width: 32px; text-align: center; }
    /* Buttons */
    .btn {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 15px 20px;
      border-radius: var(--radius); border: none;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.85; transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-secondary { background: var(--surface2); color: var(--text); }
    .btn-warning { background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; }
    .btn-sm { padding: 11px 16px; font-size: 13px; }
    .btn-row { display: flex; gap: 10px; }
    .btn-row .btn { flex: 1; }
    /* Code display */
    .code-box {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      margin-bottom: 14px;
    }
    .code-value {
      font-family: 'Courier New', monospace;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 8px;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .code-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
    #qr-canvas { border-radius: 8px; background: white; padding: 10px; max-width: 140px; }
    /* Scanner */
    .scan-area {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border-radius: var(--radius);
      overflow: hidden;
      background: #000;
      margin-bottom: 14px;
    }
    #scan-video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #scan-canvas { display: none; }
    .scan-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .scan-frame {
      width: 62%; height: 62%;
      border-radius: 16px;
      position: relative;
    }
    .scan-corner {
      position: absolute;
      width: 24px; height: 24px;
      border-color: white;
      border-style: solid;
    }
    .scan-corner.tl { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
    .scan-corner.tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
    .scan-corner.bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
    .scan-corner.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }
    .scan-line-anim {
      position: absolute;
      left: 5%; right: 5%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scanline 1.8s ease-in-out infinite;
      border-radius: 2px;
    }
    @keyframes scanline { 0% { top: 8%; } 50% { top: 92%; } 100% { top: 8%; } }
    .scan-status {
      position: absolute;
      bottom: 16px; left: 16px; right: 16px;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 8px 16px;
    }
    /* Divider */
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 14px 0;
      color: var(--text-muted); font-size: 12px;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--surface2);
    }
    /* Modal */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--surface);
      width: 100%;
      max-width: 480px;
      border-radius: 22px 22px 0 0;
      padding: 0 16px 24px;
      max-height: 92dvh;
      overflow-y: auto;
    }
    .modal-handle-wrap { padding: 12px 0 8px; display: flex; justify-content: center; }
    .modal-handle { width: 36px; height: 4px; background: var(--surface2); border-radius: 2px; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; }
    /* Detail view */
    .detail-photo-wrap {
      width: 100%; height: 190px;
      border-radius: var(--radius);
      background: var(--surface2);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 56px;
      margin-bottom: 14px;
    }
    .detail-photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .detail-cell {
      background: var(--surface2);
      border-radius: 10px;
      padding: 11px 12px;
    }
    .detail-cell.full { grid-column: 1 / -1; }
    .dc-key {
      font-size: 10px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 4px;
    }
    .dc-val { font-size: 14px; font-weight: 600; }
    .dc-code { font-family: 'Courier New', monospace; font-size: 18px; color: var(--accent); letter-spacing: 3px; }
    .storage-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }
    /* History */
    .history-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
      border: 1px solid var(--surface2);
      opacity: 0.65;
      display: flex; gap: 11px; align-items: flex-start;
    }
    /* Toast */
    .toast {
      position: fixed;
      bottom: 88px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface2);
      color: var(--text);
      padding: 11px 20px;
      border-radius: 24px;
      font-size: 13px; font-weight: 500;
      z-index: 500;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    /* Fasttrack result */
    .ft-result {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      text-align: center;
    }
    .ft-name { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .ft-meta { font-size: 13px; color: var(--text-muted); }
    /* Settings */
    .setting-row {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
      border: 1px solid var(--surface2);
    }
    .setting-label { font-size: 14px; font-weight: 500; }
    .setting-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .toggle {
      position: relative;
      width: 48px; height: 28px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--surface2);
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle-track::before {
      content: '';
      position: absolute;
      width: 22px; height: 22px;
      background: white;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-track::before { transform: translateX(20px); }
    /* Expiry warning strip */
    .expiry-strip {
      background: #78350f;
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .expiry-strip .es-icon { font-size: 20px; flex-shrink: 0; }
    .expiry-strip .es-text { font-size: 13px; color: #fcd34d; font-weight: 500; }
    /* Scroll-to-top of modal on open */
    .section-divider {
      height: 1px; background: var(--surface2); margin: 16px 0;
    }
    /* Inline input */
    .inline-input-row { display: flex; gap: 8px; }
    .inline-input-row .form-input { flex: 1; }
    .inline-input-row .btn { width: auto; padding: 13px 18px; white-space: nowrap; flex-shrink: 0; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="header-logo">❄️</span>
    <div>
      <div class="header-title" id="app-title">FrostVault</div>
      <div class="header-sub" id="app-sub">Storage tracker</div>
    </div>
  </div>
  <button class="lang-btn" onclick="toggleLang()" id="lang-btn">🇳🇴 NO</button>
</div>

<!-- Home screen -->
<div class="screen active" id="screen-home">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="search-input" oninput="renderHome()" placeholder="Search items…">
  </div>
  <div class="filter-tabs" id="filter-tabs"></div>
  <div id="expiry-warnings"></div>
  <div id="items-list"></div>
</div>

<!-- Add Item screen -->
<div class="screen" id="screen-add">
  <div class="form-section">
    <label class="form-label" id="lbl-photo">Photo (optional)</label>
    <div class="photo-area" id="photo-area" onclick="triggerPhotoCapture()">
      <span class="pa-icon">📷</span>
      <span class="pa-label" id="pa-label">Tap to take photo</span>
    </div>
    <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoInput(event)">
  </div>
  <div class="form-section">
    <label class="form-label" id="lbl-storage-type">Storage type</label>
    <div class="storage-grid" id="storage-grid"></div>
  </div>
  <div class="form-section">
    <label class="form-label" id="lbl-location">Location / label</label>
    <input type="text" class="form-input" id="f-location" placeholder="e.g. Shelf 2, Box A, Top drawer">
  </div>
  <div class="form-section">
    <label class="form-label" id="lbl-name">Item name *</label>
    <input type="text" class="form-input" id="f-name" placeholder="e.g. Chicken breast, Soup, Leftovers">
  </div>
  <div class="form-section">
    <label class="form-label" id="lbl-quantity">Quantity</label>
    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <span class="qty-val" id="qty-display">1</span>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
      <select class="form-input" id="f-unit" style="max-width:140px">
        <option value="pcs">pcs</option>
        <option value="kg">kg</option>
        <option value="g">g</option>
        <option value="L">L</option>
        <option value="portions">portions</option>
        <option value="bags">bags</option>
        <option value="boxes">boxes</option>
      </select>
    </div>
  </div>
  <div class="form-section">
    <label class="form-label" id="lbl-sellby">Best before / Sell by date</label>
    <input type="date" class="form-input" id="f-sellby">
  </div>
  <div class="form-section">
    <label class="form-label" id="lbl-notes">Notes</label>
    <textarea class="form-input" id="f-notes" placeholder="Any extra info…"></textarea>
  </div>
  <button class="btn btn-primary" onclick="saveItem()" id="btn-save-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:20px;height:20px"><path d="M5 13l4 4L19 7"/></svg>
    <span id="btn-save-label">Save & Generate Code</span>
  </button>
</div>

<!-- Scan screen -->
<div class="screen" id="screen-scan">

        <div class="scan-corner tl"></div>

function t(key, ...args) {
  const val = T[lang][key];
  return typeof val === 'function' ? val(...args) : (val ?? key);
}

// ─── Storage helpers ──────────────────────────────────────────────────────────
const STORAGE_TYPES = [
  { id: 'freezer', icon: '❄️', color: '#3b82f6' },
  { id: 'fridge',  icon: '🟢', color: '#10b981' },
  { id: 'shelf',   icon: '📦', color: '#f59e0b' },
  { id: 'box',     icon: '🗃️', color: '#8b5cf6' },
];

function storageLabel(id) {
  return { freezer: t('storageFreezer'), fridge: t('storageFridge'), shelf: t('storageShelf'), box: t('storageBox') }[id] || id;
}
function storageMeta(id) { return STORAGE_TYPES.find(s => s.id === id) || STORAGE_TYPES[0]; }
function storageIcon(id) { return storageMeta(id).icon; }
function storageColor(id) { return storageMeta(id).color; }

// ─── Code generation ──────────────────────────────────────────────────────────
const CODE_CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
function genCode() {
  let code = '';
  const arr = new Uint8Array(6);
  crypto.getRandomValues(arr);
  for (let i = 0; i < 6; i++) code += CODE_CHARS[arr[i] % CODE_CHARS.length];
  // Ensure unique
  if (items.some(x => x.code === code)) return genCode();
  return code;
}

// ─── Date helpers ─────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0, 10); }
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const diff = new Date(dateStr) - new Date(today());
  return Math.round(diff / 86400000);
}
function formatDate(dateStr) {
  if (!dateStr) return t('noDate');
  const d = new Date(dateStr);
  return d.toLocaleDateString(lang === 'no' ? 'nb-NO' : 'en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function expiryBadge(dateStr) {
  if (!dateStr) return '';
  const days = daysUntil(dateStr);
  if (days < 0) return `<span class="badge badge-exp">⚠ ${t('expiredDaysAgo', Math.abs(days))}</span>`;
  if (days <= 3) return `<span class="badge badge-soon">⏰ ${t('daysLeft', days)}</span>`;
  return `<span class="badge badge-ok">✓ ${t('daysLeft', days)}</span>`;
}

// ─── Persist ──────────────────────────────────────────────────────────────────
function saveItems() { localStorage.setItem('fv_items', JSON.stringify(items)); }

// ─── Navigation ───────────────────────────────────────────────────────────────
function goScreen(name) {
  if (currentScreen === 'scan' && name !== 'scan') stopScan();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  currentScreen = name;
  if (name === 'home') renderHome();
  if (name === 'history') renderHistory();
  if (name === 'scan') startScan();
  if (name === 'add') resetAddForm();
  if (name === 'settings') renderSettings();
  window.scrollTo(0, 0);
}

  lang = lang === 'en' ? 'no' : 'en';

  applyLang();
  renderHome();
  if (currentScreen === 'history') renderHistory();
  if (currentScreen === 'settings') renderSettings();
}

// ─── Home screen ──────────────────────────────────────────────────────────────
function renderFilterTabs() {
  const tabs = [
    { id: 'all', label: t('filterAll') },
    { id: 'freezer', label: t('filterFreezer') },
    { id: 'fridge', label: t('filterFridge') },
    { id: 'shelf', label: t('filterShelf') },
    { id: 'box', label: t('filterBox') },
  ];
  document.getElementById('filter-tabs').innerHTML = tabs.map(tab =>
    `<button class="filter-tab ${activeFilter === tab.id ? 'active' : ''}" onclick="setFilter('${tab.id}')">${tab.label}</button>`
  ).join('');
}

function setFilter(f) {
  activeFilter = f;
  renderFilterTabs();
  renderHome();
}

function renderHome() {
  const search = (document.getElementById('search-input')?.value || '').toLowerCase();
  const active = items.filter(i => i.status === 'active');

  // Expiry warnings
  const warnItems = active.filter(i => i.sellby && daysUntil(i.sellby) <= 3);
  const ewEl = document.getElementById('expiry-warnings');
  if (warnItems.length) {
    ewEl.innerHTML = `<div class="expiry-strip"><span class="es-icon">⚠️</span><span class="es-text">${t('expiryWarning', warnItems.length)}</span></div>`;
  } else {
    ewEl.innerHTML = '';
  }

  const storageTypes = activeFilter === 'all'
    ? STORAGE_TYPES.map(s => s.id)
    : [activeFilter];

  let html = '';
  let hasAny = false;

  for (const sType of storageTypes) {
    let sItems = active.filter(i => i.storage === sType);
    if (search) sItems = sItems.filter(i => i.name.toLowerCase().includes(search) || i.code.toLowerCase().includes(search) || (i.location||'').toLowerCase().includes(search));
    if (!sItems.length) continue;
    hasAny = true;
    const meta = storageMeta(sType);
    html += `<div class="storage-section">
      <div class="section-header">
        <div class="section-dot" style="background:${meta.color}"></div>
        <span class="section-title">${storageLabel(sType)}</span>
        <span class="section-count">${sItems.length}</span>
      </div>`;
    for (const item of sItems) {
      html += renderItemCard(item);
    }
    html += `</div>`;
  }

  if (!hasAny) {
    html = `<div class="empty-state"><div class="e-icon">${search ? '🔍' : '📭'}</div><p>${search ? 'No items match your search.' : t('emptyHome').replace('\n', '<br>')}</p></div>`;
  }
  document.getElementById('items-list').innerHTML = html;
}

function renderItemCard(item) {
  const thumbHtml = item.photo
    ? `<img src="${item.photo}" alt="">`
    : storageIcon(item.storage);
  const days = item.sellby ? daysUntil(item.sellby) : null;
  const expBadge = expiryBadge(item.sellby);
  const loc = item.location ? `${item.location} · ` : '';
  return `<div class="item-card" onclick="openDetail('${item.id}')">
    <div class="item-thumb">${thumbHtml}</div>
    <div class="item-body">
      <div class="item-name">${escHtml(item.name)}</div>
      <div class="item-sub">${loc}${formatDate(item.dateAdded)}</div>
      <div class="item-badges">
        <span class="badge badge-code">${item.code}</span>
        ${expBadge}
      </div>
    </div>
    <div class="item-qty">${item.quantity} ${t('units')[item.unit]||item.unit}</div>
  </div>`;
}

// ─── History ──────────────────────────────────────────────────────────────────
function renderHistory() {
  const removed = items.filter(i => i.status === 'removed').sort((a,b) => (b.removedDate||'').localeCompare(a.removedDate||''));
  const el = document.getElementById('history-list');
  if (!removed.length) {
    el.innerHTML = `<div class="empty-state"><div class="e-icon">🗂️</div><p>${t('emptyHistory')}</p></div>`;
    return;
  }
  el.innerHTML = `<h2 style="font-size:16px;font-weight:700;margin-bottom:12px">${t('historyTitle')}</h2>` +
    removed.map(item => {
      const thumbHtml = item.photo ? `<img src="${item.photo}" alt="">` : storageIcon(item.storage);
      return `<div class="history-card" onclick="openDetail('${item.id}')">
        <div class="item-thumb">${thumbHtml}</div>
        <div class="item-body">
          <div class="item-name">${escHtml(item.name)}</div>
          <div class="item-sub">${storageLabel(item.storage)} · ${t('removedOn')}: ${formatDate(item.removedDate)}</div>
          <div class="item-badges"><span class="badge badge-code">${item.code}</span></div>
        </div>
      </div>`;
    }).join('');
}

// ─── Add item ─────────────────────────────────────────────────────────────────
function renderStorageGrid() {
  document.getElementById('storage-grid').innerHTML = STORAGE_TYPES.map(s =>
    `<div class="storage-opt ${selectedStorage === s.id ? 'sel' : ''}" onclick="selectStorage('${s.id}')">
      <div class="so-icon">${s.icon}</div>
      <div class="so-label">${storageLabel(s.id)}</div>
    </div>`
  ).join('');
}

function selectStorage(id) {
  selectedStorage = id;
  renderStorageGrid();
}

function resetAddForm() {
  capturedPhoto = null;
  quantity = 1;
  selectedStorage = 'freezer';
  editingId = null;
  document.getElementById('photo-area').innerHTML = `<span class="pa-icon">📷</span><span class="pa-label" id="pa-label">${t('tapPhoto')}</span>`;
  document.getElementById('f-name').value = '';
  document.getElementById('f-location').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-sellby').value = '';
  document.getElementById('f-unit').value = 'pcs';
  document.getElementById('qty-display').textContent = '1';
  renderStorageGrid();
}

function changeQty(delta) {
  quantity = Math.max(1, quantity + delta);
  document.getElementById('qty-display').textContent = quantity;
}

function triggerPhotoCapture() {
  document.getElementById('photo-input').click();
}

function handlePhotoInput(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    capturedPhoto = ev.target.result;
    // Compress
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > h && w > MAX) { h = h * MAX / w; w = MAX; }
      else if (h > MAX) { w = w * MAX / h; h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      capturedPhoto = canvas.toDataURL('image/jpeg', 0.75);
      const pa = document.getElementById('photo-area');
      pa.innerHTML = `<img src="${capturedPhoto}"><div class="photo-overlay">${t('changePhoto')}</div>`;
      pa.onclick = triggerPhotoCapture;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('⚠ ' + t('nameLabel')); return; }
  const code = genCode();
  const item = {
    id: crypto.randomUUID(),
    code,
    name,
    storage: selectedStorage,
    location: document.getElementById('f-location').value.trim(),
    photo: capturedPhoto,
    dateAdded: today(),
    sellby: document.getElementById('f-sellby').value || null,
    quantity,
    unit: document.getElementById('f-unit').value,
    notes: document.getElementById('f-notes').value.trim(),
    status: 'active',
    removedDate: null,
  };
  items.unshift(item);
  saveItems();
  showToast(t('toastSaved'));
  showCodeModal(item);
  resetAddForm();
}

// ─── Code modal ───────────────────────────────────────────────────────────────
function showCodeModal(item) {
  document.getElementById('code-display-val').textContent = item.code;
  document.getElementById('code-modal').classList.add('open');
  // Generate QR
  const canvas = document.getElementById('qr-canvas');
  QRCode.toCanvas(canvas, item.code, { width: 140, margin: 1, color: { dark: '#000', light: '#fff' } }, () => {});
}

function closeCodeModal() {
  document.getElementById('code-modal').classList.remove('open');
  goScreen('home');
}

// ─── Item detail modal ────────────────────────────────────────────────────────
function openDetail(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const isRemoved = item.status === 'removed';
  const meta = storageMeta(item.storage);
  const days = item.sellby ? daysUntil(item.sellby) : null;

  let photoHtml = item.photo
    ? `<div class="detail-photo-wrap"><img src="${item.photo}" alt="${escHtml(item.name)}"></div>`
    : `<div class="detail-photo-wrap">${storageIcon(item.storage)}</div>`;

  let expiryHtml = '';
  if (item.sellby) {
    expiryHtml = `<div class="detail-cell">
      <div class="dc-key">${t('detailBestBefore')}</div>
      <div class="dc-val">${formatDate(item.sellby)}<br>${expiryBadge(item.sellby)}</div>
    </div>`;
  }

  let actionsHtml = '';
  if (!isRemoved) {
    actionsHtml = `
      <button class="btn btn-warning" style="margin-bottom:10px" onclick="fasttackFromDetail('${id}')">
        ${t('btnFasttrack')}
      </button>
      <button class="btn btn-secondary" onclick="markRemoved('${id}')">
        ${t('btnMarkRemoved')}
      </button>`;
  } else {
    actionsHtml = `<button class="btn btn-success" onclick="restoreItem('${id}')">${t('btnRestore')}</button>`;
  }

  document.getElementById('detail-content').innerHTML = `
    ${photoHtml}
    <div class="modal-title">${escHtml(item.name)}</div>
    <div class="detail-grid">
      <div class="detail-cell full">
        <div class="dc-key">${t('detailCode')}</div>
        <div class="dc-val dc-code" onclick="copyCode('${item.code}')" style="cursor:pointer">${item.code} <span style="font-size:12px;color:var(--text-muted)">⧉</span></div>
      </div>
      <div class="detail-cell">
        <div class="dc-key">${t('detailStorage')}</div>
        <div class="dc-val">
          <span class="storage-pill" style="background:${meta.color}22;color:${meta.color}">
            ${meta.icon} ${storageLabel(item.storage)}
          </span>
        </div>
      </div>
      <div class="detail-cell">
        <div class="dc-key">${t('detailAdded')}</div>
        <div class="dc-val">${formatDate(item.dateAdded)}</div>
      </div>
      <div class="detail-cell">
        <div class="dc-key">${t('detailLocation')}</div>
        <div class="dc-val">${escHtml(item.location || t('noLocation'))}</div>
      </div>
      <div class="detail-cell">
        <div class="dc-key">${t('detailQty')}</div>
        <div class="dc-val">${item.quantity} ${t('units')[item.unit]||item.unit}</div>
      </div>
      ${expiryHtml}
      ${item.notes ? `<div class="detail-cell full"><div class="dc-key">${t('detailNotes')}</div><div class="dc-val">${escHtml(item.notes)}</div></div>` : ''}
      ${isRemoved ? `<div class="detail-cell full"><div class="dc-key">${t('removedOn')}</div><div class="dc-val">${formatDate(item.removedDate)}</div></div>` : ''}
    </div>
    ${actionsHtml}
    <div style="height:10px"></div>
    <button class="btn btn-secondary btn-sm" onclick="closeDetailModal()">${t('btnClose')}</button>
  `;

  // Generate mini QR in detail
  const qrWrap = document.createElement('div');
  qrWrap.style.cssText = 'margin-bottom:12px';
  const qrC = document.createElement('canvas');
  document.getElementById('detail-content').querySelector('.modal-title').after(qrWrap);
  qrWrap.appendChild(qrC);
  QRCode.toCanvas(qrC, item.code, { width: 100, margin: 1, color: { dark: '#000', light: '#fff' } }, () => {});

  document.getElementById('detail-modal').classList.add('open');
}

function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('open');
}

function fasttackFromDetail(id) {
  markRemoved(id);
  closeDetailModal();
}

function markRemoved(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.status = 'removed';
  item.removedDate = today();
  saveItems();
  closeDetailModal();
  renderHome();
  showToast(t('toastRemoved'));
}

function restoreItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.status = 'active';
  item.removedDate = null;
  saveItems();
  closeDetailModal();
  renderHistory();
  showToast(t('toastRestored'));
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => showToast(t('toastCopied')));
}

// ─── Scanner ──────────────────────────────────────────────────────────────────
let scanMode = 'lookup'; // 'lookup' | 'fasttrack'

function startScan() {
  document.getElementById('scan-result').innerHTML = '';
  document.getElementById('manual-code-input').value = '';
  if (!navigator.mediaDevices?.getUserMedia) {
    document.getElementById('scan-status').textContent = 'Camera not available on this device.';
    return;
  }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(stream => {
      scanStream = stream;
      const video = document.getElementById('scan-video');
      video.srcObject = stream;
      video.play();
      video.addEventListener('loadeddata', () => { scanTick(); });
    })
    .catch(err => {
      document.getElementById('scan-status').textContent = 'Camera access denied. Use manual code entry.';
    });
}

function stopScan() {
  if (scanAnimFrame) { cancelAnimationFrame(scanAnimFrame); scanAnimFrame = null; }
  if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
  const video = document.getElementById('scan-video');
  if (video) video.srcObject = null;
}

function scanTick() {
  const video = document.getElementById('scan-video');
  const canvas = document.getElementById('scan-canvas');
  if (!video || !canvas || !scanStream) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'dontInvert' });
    if (code && code.data) {
      handleCodeFound(code.data.trim().toUpperCase());
      return;
    }
  }
  scanAnimFrame = requestAnimationFrame(scanTick);
}

function handleCodeFound(code) {
  stopScan();
  const item = items.find(i => i.code === code && i.status === 'active');
  const removedItem = items.find(i => i.code === code && i.status === 'removed');
  const resultEl = document.getElementById('scan-result');

  if (!item && !removedItem) {
    resultEl.innerHTML = `<div class="ft-result"><div class="ft-name">❓</div><div class="ft-meta">${t('noItem')}</div></div>
      <button class="btn btn-secondary" onclick="startScan()">${t('navScan')} again</button>`;
    return;
  }
  if (removedItem) {
    resultEl.innerHTML = `<div class="ft-result">
      <div class="ft-name">${escHtml(removedItem.name)}</div>
      <div class="ft-meta">${t('alreadyRemoved')}</div>
    </div>
    <button class="btn btn-secondary" onclick="startScan()">Scan again</button>`;
    return;
  }

  // Show fasttrack result
  const meta = storageMeta(item.storage);
  const days = item.sellby ? daysUntil(item.sellby) : null;
  resultEl.innerHTML = `
    <div class="ft-result">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:6px">${t('fasttrackTitle')}</div>
      <div class="ft-name">${escHtml(item.name)}</div>
      <div class="ft-meta">${storageLabel(item.storage)}${item.location ? ' · ' + escHtml(item.location) : ''}</div>
      <div class="ft-meta" style="margin-top:4px">${t('detailAdded')}: ${formatDate(item.dateAdded)}</div>
      ${item.sellby ? `<div class="ft-meta" style="margin-top:4px">${t('detailBestBefore')}: ${formatDate(item.sellby)} ${expiryBadge(item.sellby)}</div>` : ''}
    </div>
    <button class="btn btn-warning" style="margin-bottom:10px" onclick="fasttackScan('${item.id}')">
      ${t('btnFasttrack')}
    </button>
    <button class="btn btn-secondary btn-sm" style="margin-bottom:8px" onclick="openDetailFromScan('${item.id}')">
      View details
    </button>
    <button class="btn btn-secondary btn-sm" onclick="startScan()">Scan again</button>`;
}

function fasttackScan(id) {
  markRemovedNoModal(id);
  document.getElementById('scan-result').innerHTML = `
    <div class="ft-result">
      <div style="font-size:32px;margin-bottom:8px">✅</div>
      <div class="ft-name">${t('toastRemoved')}</div>
    </div>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="startScan()">Scan again</button>`;
}

function markRemovedNoModal(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.status = 'removed';
  item.removedDate = today();
  saveItems();
  showToast(t('toastRemoved'));
}

function openDetailFromScan(id) {
  openDetail(id);
}

function lookupManualCode() {
  const raw = document.getElementById('manual-code-input').value.trim().toUpperCase();
  if (!raw) return;
  handleCodeFound(raw);
}

// Allow Enter key for manual code lookup
document.getElementById('manual-code-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookupManualCode();
});

// ─── Settings ─────────────────────────────────────────────────────────────────
function renderSettings() {
  // nothing extra needed – applyLang handles labels
}

function exportData() {
  const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `frosty-backup-${today()}.json`;
  a.click();
}

function confirmClearAll() {
  if (confirm(t('clearConfirm'))) {
    items = [];
    saveItems();
    showToast(t('toastCleared'));
    renderHome();
  }
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── Util ──────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close modals on backdrop click
document.getElementById('detail-modal').addEventListener('click', function(e) {
  if (e.target === this) closeDetailModal();
});
document.getElementById('code-modal').addEventListener('click', function(e) {
  if (e.target === this) closeCodeModal();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
applyLang();
renderHome();
renderStorageGrid();
</script>
